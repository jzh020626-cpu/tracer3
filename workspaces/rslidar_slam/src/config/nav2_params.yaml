amcl:
  ros__parameters:
    use_sim_time: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""  # SLAM 模式下不使用静态地图

bt_navigator:
  ros__parameters:
    use_sim_time: false
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_vel_x: 0.0
    max_vel_x: 0.4
    min_vel_theta: -1.0
    max_vel_theta: 1.0
    min_in_place_vel_theta: 0.3
    acc_lim_x: 2.5
    acc_lim_theta: 3.2
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: 0.0
      max_vel_x: 0.4
      max_vel_theta: 1.0
      min_vel_theta: -1.0
      min_in_place_vel_theta: 0.3
      acc_lim_x: 2.5
      acc_lim_theta: 3.2
      vx_samples: 20
      vtheta_samples: 40
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true

      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]

      RotateToGoal:
        scale: 32.0
        lookahead_time: -1.0
      Oscillation:
        scale: 0.0
      BaseObstacle:
        scale: 0.02
      GoalAlign:
        scale: 24.0
        forward_point_distance: 0.1
      PathAlign:
        scale: 32.0
        forward_point_distance: 0.1
      PathDist:
        scale: 32.0
      GoalDist:
        scale: 24.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

recoveries_server:
  ros__parameters:
    use_sim_time: false
    recovery_plugins: ["Spin", "BackUp", "Wait"]

    Spin:
      plugin: "nav2_recoveries/Spin"
    BackUp:
      plugin: "nav2_recoveries/BackUp"
    Wait:
      plugin: "nav2_recoveries/Wait"

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: tracer3/base_link
      update_frequency: 1.0
      publish_frequency: 1.0
      resolution: 0.05
      width: 50
      height: 50
      origin_x: 0.0
      origin_y: 0.0
      track_unknown_space: true
      rolling_window: false

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: tracer3/scan
          sensor_frame: tracer3/rslidar   # 请替换为你雷达在 TF 中的 frame_id
          data_type: LaserScan
          clearing: true
          marking: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.3

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: tracer3/odom
      robot_base_frame: tracer3/base_link
      update_frequency: 5.0
      publish_frequency: 2.0
      resolution: 0.05
      width: 3
      height: 3
      rolling_window: true
      track_unknown_space: true

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: tracer3/scan
          sensor_frame: tracer3/rslidar   # 请替换为你雷达在 TF 中的 frame_id
          data_type: LaserScan
          clearing: true
          marking: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.3